<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ page.title | default: site.title }}</title>
    <meta
      name="description"
      content="{{ page.description | default: site.description }}"
    />
    <meta name="theme-color" content="#060816" />
    <meta property="og:type" content="website" />
    <meta
      property="og:title"
      content="{{ page.title | default: site.title }}"
    />
    <meta
      property="og:description"
      content="{{ page.description | default: site.description }}"
    />
    <meta
      property="og:image"
      content="{{ '/social-preview.svg' | absolute_url }}"
    />
    <meta property="og:url" content="{{ page.url | absolute_url }}" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="{{ page.title | default: site.title }}"
    />
    <meta
      name="twitter:description"
      content="{{ page.description | default: site.description }}"
    />
    <meta
      name="twitter:image"
      content="{{ '/social-preview.svg' | absolute_url }}"
    />
    <link
      rel="icon"
      href="{{ '/favicon.svg' | relative_url }}"
      type="image/svg+xml"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&amp;family=Sora:wght@400;500;600;700;800&amp;display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ '/assets/css/style.css' | relative_url }}"
    />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareSourceCode",
        "name": "{{ site.title }}",
        "codeRepository": "{{ site.repository_url }}",
        "programmingLanguage": "TypeScript",
        "license": "https://opensource.org/license/mit",
        "description": "{{ site.description }}",
        "runtimePlatform": "Node.js",
        "url": "{{ site.url }}{{ site.baseurl }}"
      }
    </script>
  </head>
  <body class="{{ page.body_class | default: 'site-page' }}">
    <div class="bg-orb bg-orb-left"></div>
    <div class="bg-orb bg-orb-right"></div>

    <div class="site-shell">
      <header class="site-header" data-header>
        <a
          class="brand"
          href="{{ '/' | relative_url }}"
          aria-label="agenv home"
        >
          <span class="brand-mark">A</span>
          <span class="brand-copy">
            <strong>agenv</strong>
            <span>portable AI workspace setup</span>
          </span>
        </a>

        <nav class="site-nav" aria-label="Primary">
          <a href="#story">Story</a>
          <a href="#flow">How it works</a>
          <a href="#launch">Launch</a>
        </nav>
      </header>

      <main>{{ content }}</main>

      <footer class="site-footer">
        <p>Open source AI workspace infrastructure for real repositories.</p>
        <div class="footer-links">
          <a href="{{ site.repository_url }}" target="_blank" rel="noreferrer"
            >GitHub</a
          >
          <a href="{{ site.npm_url }}" target="_blank" rel="noreferrer">npm</a>
          <a
            href="{{ site.repository_url }}/blob/main/README.md"
            target="_blank"
            rel="noreferrer"
            >Docs</a
          >
        </div>
      </footer>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="{{ '/assets/js/site.js' | relative_url }}" defer></script>
  </body>
</html>
